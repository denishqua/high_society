<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Society: The Ape Aristocracy</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div id="app" class="container">
        <!-- Setup Screen -->
        <section id="setup-screen" class="glass-panel active">
            <h1 class="title">The Ape Aristocracy</h1>
            <p class="subtitle">A game of High Society</p>
            
            <div class="setup-controls">
                <div class="player-inputs">
                    <div class="input-group">
                        <label for="human-count">Human Players:</label>
                        <input type="number" id="human-count" value="1" min="0" max="5">
                    </div>
                    <div class="input-group">
                        <label for="cpu-count">Computer Players:</label>
                        <input type="number" id="cpu-count" value="2" min="0" max="5">
                    </div>
                    <div class="input-group">
                        <label for="cpu-speed">CPU Speed (s):</label>
                        <input type="number" id="cpu-speed" value="0.5" min="0.1" max="5.0" step="0.1">
                    </div>
                </div>
                <p id="setup-error" class="error-text hidden">Total players must be between 3 and 5.</p>
                <button id="btn-start" class="btn-primary">Open the Ballroom</button>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="hidden">
            <div class="game-layout">
                
                <!-- Left Column: Auction & Log -->
                <div class="left-col">
                    <div id="auction-center" class="glass-panel">
                        <h2>Current Auction</h2>
                        <div id="auction-card" class="card empty">
                            <span class="card-title">Waiting...</span>
                        </div>
                        <div id="auction-info">
                            <p class="auction-type"></p>
                        </div>
                    </div>
                    
                    <div id="game-log" class="glass-panel">
                        <h3>Ballroom Gossip</h3>
                        <div class="log-content"></div>
                    </div>
                </div>

                <!-- Right Column: Players & Action -->
                <div class="right-col">
                    <div id="players-dashboard" class="glass-panel">
                        <h3>The Distinguished Guests</h3>
                        <div id="players-grid">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                    
                    <div id="action-panel" class="glass-panel">
                        <h3 id="active-player-name">Waiting...</h3>
                        <p id="action-prompt">It's your turn to act.</p>
                        
                        <div id="hand-container" class="hand">
                            <!-- Populated by JS -->
                        </div>
                        
                        <div class="action-controls" id="action-controls-panel">
                            <div class="bid-summary">
                                Selected: <span id="selected-bid-total" class="gold-text">0</span> 🍌
                            </div>
                            <button id="btn-bid" class="btn-primary">Submit Bid</button>
                            <button id="btn-pass" class="btn-secondary">Pass</button>
                        </div>

                        <div id="round-result-panel" class="hidden" style="text-align: center; margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.5); border-radius: 8px;">
                            <h4 id="round-result-text" class="gold-text" style="margin-bottom: 1rem;"></h4>
                            <button id="btn-next-round" class="btn-primary">Next Round</button>
                        </div>
                    </div>
                </div>
                
            </div>
        </section>
        
        <!-- Game Over Screen -->
        <section id="game-over-screen" class="glass-panel hidden">
            <h1 class="title">The Season Concludes</h1>
            <h2 id="winner-announcement" class="gold-text"></h2>
            
            <div id="final-rankings">
                <!-- Populated by JS -->
            </div>
            
            <div style="margin-top: 2rem;">
                <h3>Final Game Log</h3>
                <div id="final-log" class="log-content" style="max-height: 250px; text-align: left; background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 8px;">
                    <!-- Populated by JS -->
                </div>
            </div>
            
            <button id="btn-play-again" class="btn-primary" style="margin-top: 1rem;">Host Another Soirée</button>
        </section>
    </div>

    <!-- Scripts -->
    <script src="/static/index.js"></script>
</body>
</html>
